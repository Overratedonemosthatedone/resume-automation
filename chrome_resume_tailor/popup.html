<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Tailor</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    body {
      margin: 0;
      min-width: 280px;
      background: #f7f8fb;
      color: #0f172a;
    }

    main {
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .queue-status {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 10px 12px;
      border: 1px solid #dbe3f0;
      border-radius: 10px;
      background: #ffffff;
    }

    .queue-label {
      font-size: 12px;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .queue-value {
      font-size: 24px;
      font-weight: 700;
      color: #0f172a;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 11px 12px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s ease;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.7;
    }

    #captureButton {
      background: #0f766e;
      color: #ffffff;
    }

    #processButton {
      background: #e2e8f0;
      color: #0f172a;
    }

    .status {
      margin: 0;
      min-height: 36px;
      font-size: 12px;
      line-height: 1.4;
      color: #334155;
    }

    .status.error {
      color: #b91c1c;
    }
  </style>
</head>
<body>
  <main>
    <section class="queue-status" aria-live="polite">
      <span class="queue-label">Pending Jobs</span>
      <span id="pendingCount" class="queue-value">...</span>
    </section>
    <button id="captureButton" type="button">Send to Resume Tailor</button>
    <button id="processButton" type="button">Process Queue</button>
    <p id="statusMessage" class="status">Ready.</p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
